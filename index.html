<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Cici的点读库</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* 选项卡（横向排列）核心样式 */
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid #007bff; margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #e0f0ff; border: 2px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; font-size: 16px; font-weight: bold; color: #333; transition: 0.2s; white-space: nowrap; }
        .tab-btn:hover { background: #cce0ff; }
        .tab-btn.active { background: #007bff; color: white; border-color: #007bff; }

        /* 控制内容显示与隐藏 */
        .test-section { display: none; }
        .test-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 内部排版样式 */
        .part-title { color: #007bff; margin-top: 15px; margin-bottom: 10px; font-weight: bold; font-size: 1.2em; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .word-grid { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px 0 20px 0; }

        /* 卡片样式 */
        .card { width: 140px; padding: 25px 10px 20px 10px; border: 2px solid #007bff; border-radius: 10px;
                text-align: center; cursor: pointer; background: white; font-weight: bold; font-size: 18px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1); user-select: none; position: relative; }
        .card:active { transform: scale(0.95); }
        
        /* 中文释义样式 */
        .meaning { color: #d9534f; font-size: 15px; margin-top: 8px; display: none; font-weight: normal; }

        /* “译”字小图标样式 */
        .trans-btn { position: absolute; top: 5px; right: 5px; font-size: 12px; color: #888; background: #f0f0f0; 
                     border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; 
                     justify-content: center; font-weight: normal; transition: 0.2s; z-index: 10; }
        .trans-btn:hover { background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs" id="tabs-container"></div>
        <div id="content-container"></div>
    </div>

    <script>
        // ==========================================
        // 核心修复1：将动作函数提取到最外层（全局），任何浏览器都能识别
        // ==========================================
        
        // 播放发音功能
        function playWord(event, audioUrl) {
            var audio = new Audio(audioUrl);
            audio.play();
        }

        // 翻转翻译功能
        function toggleMeaning(event, btnElement) {
            // 兼容老浏览器的拦截点击技术（点翻译不发音）
            if (event && event.stopPropagation) {
                event.stopPropagation();
            } else if (window.event) {
                window.event.cancelBubble = true;
            }
            
            // 找到对应的中文，控制显示/隐藏
            var card = btnElement.parentElement;
            var m = card.querySelector('.meaning');
            if (m) {
                m.style.display = (m.style.display === 'block') ? 'none' : 'block';
            }
        }

        // ==========================================

                "Part 3": [], 
                "Part 4": [], 
                "Part 5": [], 
                "Part 6": [] 
            },
            "Test 4": { "Part 1": [], "Part 2": [], "Part 3": [], "Part 4": [], "Part 5": [], "Part 6": [] },
            "Test 5": { "Part 1": [], "Part 2": [], "Part 3": [], "Part 4": [], "Part 5": [], "Part 6": [] },
            "Test 6": { "Part 1": [], "Part 2": [], "Part 3": [], "Part 4": [], "Part 5": [], "Part 6": [] }
        };

        var tabsContainer = document.getElementById('tabs-container');
        var contentContainer = document.getElementById('content-container');
        var isFirst = true;

        for (var testName in content) {
            // 1. 生成横向 Tab 按钮
            var tabBtn = document.createElement('button');
            tabBtn.className = 'tab-btn' + (isFirst ? ' active' : '');
            tabBtn.innerText = testName;
            var safeTestId = testName.replace(/\s+/g, '_');
            tabBtn.setAttribute('data-target', safeTestId);
            tabsContainer.appendChild(tabBtn);

            // 2. 生成对应的 Test 内容区块
            var testSection = document.createElement('div');
            testSection.className = 'test-section' + (isFirst ? ' active' : '');
            testSection.id = 'sec-' + safeTestId;

            for (var partName in content[testName]) {
                testSection.innerHTML += '<div class="part-title">' + partName + '</div>';
                var grid = document.createElement('div');
                grid.className = 'word-grid';

                content[testName][partName].forEach(function(item) {
                    var card = document.createElement('div');
                    card.className = 'card';
                    
                    // 核心修复2：直接把 onclick 写进 HTML 里！绝对不失效！
                    card.setAttribute('onclick', "playWord(event, '" + item.audio + "')");
                    
                    card.innerHTML = 
                        '<div class="trans-btn" onclick="toggleMeaning(event, this)">译</div>' + 
                        '<div>' + item.word + '</div>' + 
                        '<div class="meaning">' + item.meaning + '</div>';

                    grid.appendChild(card);
                });
                testSection.appendChild(grid);
            }
            contentContainer.appendChild(testSection);
            isFirst = false;
        }

        // 3. Tab 切换逻辑
        var allTabs = document.querySelectorAll('.tab-btn');
        var allSections = document.querySelectorAll('.test-section');

        allTabs.forEach(function(btn) {
            btn.onclick = function() {
                allTabs.forEach(function(t) { t.classList.remove('active'); });
                allSections.forEach(function(s) { s.classList.remove('active'); });

                this.classList.add('active');
                document.getElementById('sec-' + this.getAttribute('data-target')).classList.add('active');
            };
        });
    </script>
</body>
</html>
