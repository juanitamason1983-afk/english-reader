<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cici的点读库</title>
    <style>
        .word-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px; }
        .card { width: 150px; padding: 20px; border: 2px solid #007bff; border-radius: 10px; 
                text-align: center; cursor: pointer; background: white; font-weight: bold; }
        .meaning { color: #555; font-size: 14px; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        // 使用 https 协议的音频源以避免被浏览器拦截
        var content = {
            "Test 1": {
                "Part 1": [
                    { "word": "recommend", "meaning": "推荐", "audio": "https://dict.youdao.com/dictvoice?audio=recommend&type=2" }
                ]
            }
        };

        var app = document.getElementById('app');
        for (var t in content) {
            app.innerHTML += '<h1>' + t + '</h1>';
            for (var p in content[t]) {
                app.innerHTML += '<h3>' + p + '</h3>';
                var grid = document.createElement('div');
                grid.className = 'word-grid';
                content[t][p].forEach(function(item) {
                    var div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = '<div>' + item.word + '</div><div class="meaning">' + item.meaning + '</div>';
                    
                    div.onclick = function() {
                        // 1. 播放音频
                        var audio = new Audio(item.audio);
                        audio.play().catch(function(e) { console.error("播放被拦截", e); });
                        
                        // 2. 显示中文释义
                        var m = this.querySelector('.meaning');
                        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
                    };
                    grid.appendChild(div);
                });
                app.appendChild(grid);
            }
        }
    </script>
</body>
</html>
